<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NE110 Lec 29 — Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f2;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: 500;
    color: #444;
    margin-bottom: 0.25rem;
    text-align: center;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 2rem;
    text-align: center;
  }
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 640px;
    margin-bottom: 0.75rem;
  }
  .progress-text { font-size: 0.8rem; color: #777; }
  .shuffle-btn {
    font-size: 0.8rem;
    color: #555;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .card-wrap {
    width: 100%;
    max-width: 640px;
    perspective: 1200px;
    margin-bottom: 1rem;
  }
  .card {
    width: 100%;
    min-height: 260px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s ease;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 14px;
    border: 1px solid #e0ddd6;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    text-align: center;
  }
  .face.back { transform: rotateY(180deg); background: #fafaf8; }
  .tag {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #aaa;
    margin-bottom: 1rem;
  }
  .question { font-size: 1.05rem; font-weight: 500; line-height: 1.55; color: #1a1a1a; }
  .answer { font-size: 0.95rem; line-height: 1.7; color: #444; }
  .hint {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: #bbb;
  }
  .nav {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 0.5rem;
  }
  .nav button {
    font-size: 0.85rem;
    padding: 8px 24px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #333;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nav button:hover { background: #f0ede8; }
  .nav button:disabled { opacity: 0.35; cursor: default; }
  .counter {
    font-size: 0.8rem;
    color: #888;
    min-width: 80px;
    text-align: center;
  }
  @media (max-width: 500px) {
    .face { padding: 1.5rem; }
    .question { font-size: 0.95rem; }
    .answer { font-size: 0.88rem; }
  }
</style>
</head>
<body>

<h1>NE110 — Lecture 29</h1>
<p class="subtitle">Nanotoxicology &amp; Final Review Part 2 &nbsp;·&nbsp; 45 cards</p>

<div class="progress-row">
  <span class="progress-text" id="prog">Card 1 of 45</span>
  <button class="shuffle-btn" onclick="shuffle()">⇄ Shuffle</button>
</div>

<div class="card-wrap">
  <div class="card" id="card" onclick="flip()">
    <div class="face front">
      <div class="tag" id="tag"></div>
      <div class="question" id="q"></div>
      <div class="hint">Click to reveal answer</div>
    </div>
    <div class="face back">
      <div class="tag" id="tag2"></div>
      <div class="answer" id="a"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button id="prev" onclick="nav(-1)">← Prev</button>
  <span class="counter" id="ctr">1 / 45</span>
  <button id="next" onclick="nav(1)">Next →</button>
</div>

<script>
const cards = [
  { tag: "OHSA", q: "What does OHSA stand for and which ministry oversees it?", a: "Occupational Health and Safety Act (R.S.O. 1990, c. O.1), overseen by the Ministry of Labour, Immigration, Training, and Skills Development (MLITSD)." },
  { tag: "OHSA — mandate", q: "What are the four main goals of OHSA's mandate?", a: "1) Promote occupational health and safety. 2) Prevent workplace injuries and occupational diseases. 3) Promote public awareness of OHS. 4) Educate employers, workers, and supervisors." },
  { tag: "OHSA — fulfillment", q: "How does OHSA fulfill its mandate? Name the four mechanisms.", a: "1) Outlines rights and duties for all workplace parties. 2) Establishes the Internal Responsibility System (IRS). 3) Sets measures and procedures for workplace hazards. 4) Provides enforcement for noncompliance." },
  { tag: "Workers' rights", q: "What are the three rights of workers under OHSA?", a: "1) Right to know about health and safety matters (hazard ID, training). 2) Right to participate in health and safety decisions (committees, reporting). 3) Right to refuse unsafe work until conditions are addressed." },
  { tag: "Workers' duties", q: "List three key duties of workers under OHSA.", a: "1) Comply with OHSA and regulations (no unsafe operation). 2) Use required equipment and protective devices (cannot remove or disable them). 3) Report hazards or contraventions to a supervisor or employer." },
  { tag: "Supervisors", q: "Who qualifies as a supervisor under OHSA?", a: "Someone who hires/fires/disciplines workers, directs scheduling and performance, enforces safety standards, or manages resources and equipment for worker tasks." },
  { tag: "Supervisors", q: "What are supervisors responsible for under OHSA?", a: "Ensuring OHSA compliance, ensuring proper use of equipment and PPE (with adequate instructions), and notifying workers of known workplace health and safety hazards." },
  { tag: "Employers", q: "Name three key responsibilities of employers under OHSA.", a: "1) Ensure workplaces are safe and well-maintained (all reasonable precautions). 2) Provide hazard info, safety equipment, training, and competent supervisors. 3) Post the OHSA in the workplace and ensure adequate JHSC worker representation." },
  { tag: "IRS", q: "What is the Internal Responsibility System (IRS) and how does it work?", a: "The IRS outlines the flow of responsibilities and accountabilities. Responsibilities are delegated downwards (Directors → Employer → Supervisor → Workers) and accountability flows upwards." },
  { tag: "JHSC", q: "What is the Joint Health and Safety Committee (JHSC) and what does it do?", a: "A committee of both worker and employer representatives. It identifies potential health and safety concerns, makes recommendations to address risks, and conducts regular workplace safety inspections." },
  { tag: "Hierarchy of controls", q: "List the five levels of the Hierarchy of Controls from most to least effective.", a: "1) Elimination — remove the hazard. 2) Substitution — replace with less hazardous option. 3) Engineering controls — control hazard at source. 4) Administrative controls — procedures to minimize hazard. 5) PPE — last line of defense." },
  { tag: "Hierarchy of controls", q: "Give an example of substitution in the hierarchy of controls.", a: "Switching from copper-beryllium alloys to nanostructured metals, or switching from fine powders to slurries to reduce inhalation risk." },
  { tag: "Hierarchy of controls", q: "What is PPE and when is it used?", a: "Personal Protective Equipment (e.g., respirators, gloves, aprons, earplugs). Used as a last resort — only when all other control levels are insufficient." },
  { tag: "RACE model", q: "What does the RACE model stand for?", a: "Recognize hazard → Assess hazard → Control hazard → Evaluate. A continuous improvement cycle for OHSA compliance." },
  { tag: "Inspections", q: "What are the three aims of a workplace inspection?", a: "1) Identify potential health and safety hazards. 2) Identify equipment deficiencies. 3) Identify improper employee actions or inadequate corrective actions — then make recommendations." },
  { tag: "Incident investigation", q: "What is the goal of an incident investigation and what are its three stages?", a: "Goal: prevent reoccurrence. Stages: 1) Data collection (establish scenario via interviews/reports). 2) Identify root cause(s) using the 5 Whys. 3) Recommend corrective actions." },
  { tag: "Incident vs. accident", q: "Why is 'incident' preferred over 'accident' in OHS terminology?", a: "'Accident' implies an unpredictable event. Most workplace events are predictable, so 'incident' (exposure to a hazard) is the correct term." },
  { tag: "Risk", q: "What is the formula for hazard risk?", a: "Risk = Σ Consequence × Probability. Hazards can be discrete (either/or, e.g., a fall) or continuous (ongoing exposure, e.g., noise level)." },
  { tag: "Epidemiology", q: "Define epidemiology and how it applies to nanomaterials.", a: "The study of how often diseases occur in different groups and why. Applied to nanomaterials, it investigates harmful effects and diseases they may cause." },
  { tag: "Epidemiology — rates", q: "Define incidence rate, prevalence rate, and mortality rate.", a: "Incidence rate = new cases / exposed population. Prevalence rate = existing cases / population at a point in time. Mortality rate = deaths / total population." },
  { tag: "Age-adjusted rates", q: "What is the age-standardized incidence rate (ASIR) and why is it used?", a: "ASIR adjusts for population age structure so disease rates can be compared fairly. Formula: Σ rᵢ × (pᵢ / P) over all age groups i." },
  { tag: "Relative risk", q: "What is Relative Risk (RR) and what does RR > 1 vs. RR < 1 mean?", a: "RR = (exposed with disease / total exposed) ÷ (unexposed with disease / total unexposed). RR > 1 = increased risk; RR < 1 = protective effect." },
  { tag: "Confounders", q: "What is a confounder in an epidemiological study?", a: "An independent risk factor that distorts the apparent association between an exposure and an outcome. Examples: age, smoking, socioeconomic status, geographic location, family history." },
  { tag: "Study types", q: "Name the four observational study designs.", a: "1) Cross-sectional — snapshot at one point in time. 2) Prospective — follow exposed/control groups forward. 3) Retrospective — look back in time using records. 4) Case-control — find those with the outcome, then classify by exposure." },
  { tag: "Clinical trials", q: "List four features that make a clinical trial rigorous.", a: "1) Random allocation (removes selection bias). 2) Double-blinding (removes analyst bias). 3) Placebo-controlled (removes placebo effect). 4) Terminated if exposed group shows harm or dramatic improvement." },
  { tag: "Cross-sectional bias", q: "What is antecedent-consequent (chicken-or-egg) bias?", a: "In cross-sectional studies, it is impossible to determine whether the exposure occurred before the disease developed — the study records the event but lacks individual timeline data." },
  { tag: "Case-control", q: "What is the Odds Ratio (OR) and how is it calculated?", a: "OR = (cases with exposure / cases without exposure) ÷ (controls with exposure / controls without exposure). Preferred for rare outcomes." },
  { tag: "Case-control bias", q: "Name three biases common in case-control studies.", a: "1) Selection bias — choice of control group. 2) Recall bias — cases remember exposures differently than controls. 3) Interviewer bias — how questions are framed can skew results." },
  { tag: "Bradford Hill criteria", q: "List the six Bradford Hill criteria needed to say 'chemical X causes adverse effect Y'.", a: "1) Strength of association (OR/RR > 1). 2) Temporality (exposure before effect). 3) Consistency (replicated in different studies). 4) Plausibility (biological mechanism). 5) Biological gradient (dose-response). 6) Specificity (no other confounders)." },
  { tag: "Glyphosate", q: "What is the epidemiological controversy around glyphosate and cancer?", a: "WHO's IARC classified it as 'probably carcinogenic' (Class 2A) based largely on case-control studies with recall bias. The U.S. EPA and European Chemicals Agency concluded it is not likely carcinogenic. The evidence remains contested." },
  { tag: "Sensor stats", q: "Define sensitivity (SEN) and what low sensitivity means clinically.", a: "SEN = TP / (TP + FN). Probability a test is positive when disease is present. Low sensitivity means the hazard 'gets away' — infected people are incorrectly told they are negative and may infect others." },
  { tag: "Sensor stats", q: "Define specificity (SPEC) and what low specificity means clinically.", a: "SPEC = TN / (TN + FP). Probability a test is negative when disease is absent. Low specificity means capturing something you don't want — healthy people are told they are positive and receive unnecessary treatment." },
  { tag: "Sensor stats", q: "Define PPV and NPV.", a: "PPV = TP / (TP + FP) — probability a positive result is truly positive. NPV = TN / (TN + FN) — probability a negative result is truly negative." },
  { tag: "Nanomaterial characterization", q: "What physical and chemical properties are needed to characterize a nanomaterial sample?", a: "Size, size distribution, shape, agglomeration/aggregation state, density, surface area, composition, surface charge, solubility, and crystallinity." },
  { tag: "Nanotoxicology", q: "Why does nanomaterial toxicity differ from that of micromaterials?", a: "Nanomaterials have much greater surface area relative to mass, can penetrate biological barriers more easily, and have different reactivity and physicochemical properties that do not simply scale from bulk or micro-scale behavior." },
  { tag: "Environmental Transport", q: "What is the 'Grasshopper Effect' (Global Distillation) and which chemicals does it affect?", a: "The process where semi-volatile pollutants evaporate in warm regions and condense in cold ones. They 'hop' until they get permanently trapped in polar ice and the fatty tissues of Arctic animals." },
  { tag: "Environmental Transport", q: "How do 'Flyers,' 'Swimmers,' and 'Stayers' differ in environmental mobility?", a: "Flyers (Volatile) stay gaseous and spread everywhere. Swimmers (Semi-volatile) migrate to poles via temperature-dependent condensation. Stayers (Non-volatile) remain local in soil/water." },
  { tag: "Toxicology", q: "How do you calculate a 'Safe Human Dose' from animal data?", a: "Identify the NOAEL (highest dose with no effect) and divide it by Uncertainty Factors (UF), typically factors of 10 for each source of uncertainty (e.g., 10x10x10 = 1000)." },
  { tag: "Toxicology", q: "What is the significance of the Octanol-Water partition coefficient (Kow)?", a: "A high Kow indicates a chemical is lipophilic (fat-loving), meaning it is more likely to bioaccumulate in the food chain." },
  { tag: "Nano-Engineering", q: "What is PEGylation and why is it used?", a: "Coating a nanoparticle in Polyethylene Glycol (PEG) to make it 'invisible' to the immune system, allowing it to pass through the body without being attacked." },
  { tag: "Nano-Engineering", q: "How does 'Substitution' work for nanomaterials in the Hierarchy of Controls?", a: "Changing the physical form to reduce mobility, such as using a wet slurry or paste instead of a dry powder to eliminate inhalation risk." },
  { tag: "Nano-Engineering", q: "Why is Gold a 'gold standard' for nano-sensors?", a: "Because Thiols (sulfur groups) form a strong, semi-permanent bond with Gold, allowing for the easy tethering of specific biological antibodies to the surface." },
  { tag: "Sensor Logic", q: "Why is the Positive Predictive Value (PPV) often low even for accurate tests?", a: "When the target (disease) is rare, the large healthy population produces enough false positives to drown out the true cases." },
  { tag: "Sensor Logic", q: "In high-stakes sensing (e.g., allergens), is Sensitivity or Specificity prioritized?", a: "Sensitivity is prioritized to prevent fatal false negatives, even if it results in more false positives (wasted food)." },
  { tag: "OHS Procedure", q: "What is the purpose of the '5 Whys' in an incident investigation?", a: "A root-cause analysis technique used to move past surface symptoms and identify the actual structural failure that caused an accident." },
];

let idx = 0;
let order = cards.map((_, i) => i);

function show() {
  const c = cards[order[idx]];
  document.getElementById('card').classList.remove('flipped');
  setTimeout(() => {
    document.getElementById('tag').textContent = c.tag;
    document.getElementById('tag2').textContent = c.tag;
    document.getElementById('q').textContent = c.q;
    document.getElementById('a').textContent = c.a;
  }, 50);
  const p = `Card ${idx + 1} of ${cards.length}`;
  document.getElementById('prog').textContent = p;
  document.getElementById('ctr').textContent = `${idx + 1} / ${cards.length}`;
  document.getElementById('prev').disabled = idx === 0;
  document.getElementById('next').disabled = idx === cards.length - 1;
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
}

function nav(dir) {
  idx = Math.max(0, Math.min(cards.length - 1, idx + dir));
  show();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  idx = 0;
  show();
}

show();
</script>
</body>
</html>
