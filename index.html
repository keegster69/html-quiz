<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Test your knowledge!</h1>
            <p>How much do you know about me Nick</p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of 
                        <span id="total-questions">10</span>
                    </p>
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>
            <div id="answers-container" class="answers-container"></div>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>
        <div class="screen" id="result-screen">
            <h1>Quiz Results</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span> out of 
                <span id="max-score">5</span></p>
                <div id="result-message">Good Boy!</div>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>
    <script src="scriptv2.js"></script>
    <a href="NE110_Lec29_Flashcards.html" target="_blank"
   style="position: fixed; bottom: 24px; right: 24px; z-index: 9999;
          background: #fff; color: #333; font-family: sans-serif;
          font-size: 13px; font-weight: 500; text-decoration: none;
          padding: 10px 18px; border-radius: 999px;
          border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
          transition: background 0.15s;">
    🃏 Ne 110 Flashcards
    </a>
</body>
</html>
